<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Media Gallery | Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050508;
            --bg-surface: #800000;
            --bg-card: #6b2c32;
            --accent: ##ffffff;
            --accent-glow: rgba(138, 16, 38, 0.4);
            --text-main: #ffffff;
            --text-dim: #8b8ba7;
            --border: rgba(255, 255, 255, 0.05);
            --glass: rgba(35, 12, 12, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1e1e3f 0%, transparent 50%);
        }

        .app {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .lib-name {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(to bottom, #fff, #8b8ba7);
            -webkit-text-fill-color: transparent;
        }

        .main-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 50px;
            display: flex;
            gap: 50px;
            align-items: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            margin-bottom: 40px;
        }

        .preview-box {
            position: relative;
            width: 340px;
            height: 340px;
            flex-shrink: 0;
        }

        .img-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .preview-box:hover img { transform: scale(1.05); }

        .type-tag {
            position: absolute;
            bottom: -15px;
            right: -15px;
            background: var(--accent);
            color: white;
            padding: 8px 20px;
            border-radius: 15px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            box-shadow: 0 10px 20px var(--accent-glow);
            z-index: 2;
        }

        .info-panel { flex: 1; }

        .meta-top {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 10px;
            display: block;
        }

        .file-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .file-size {
            color: var(--text-dim);
            font-size: 18px;
            margin-bottom: 35px;
        }

        /* ── Modern Buttons ── */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .nav-btn {
            width: 70px;
            height: 70px;
            border-radius: 22px;
            border: none;
            background: var(--bg-card);
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid var(--border);
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px var(--accent-glow);
            border-color: transparent;
        }

        .nav-btn:active:not(:disabled) {
            transform: translateY(0);
            filter: brightness(0.8);
        }

        .nav-btn:disabled {
            opacity: 0.1;
            cursor: not-allowed;
        }

        .nav-btn svg {
            width: 30px;
            height: 30px;
            fill: currentColor;
        }
        .filter-group {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 20px;
            width: fit-content;
        }

        .f-btn {
            padding: 10px 22px;
            border-radius: 14px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .f-btn:hover { color: var(--text-main); }

        .f-btn.active {
            background: var(--bg-card);
            color: var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .list-section {
            background: var(--bg-surface);
            border-radius: 35px;
            padding: 30px;
            border: 1px solid var(--border);
        }

        .list-title {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--text-dim);
            margin-bottom: 25px;
            padding-left: 10px;
        }

        .media-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 22px;
            gap: 20px;
            transition: 0.2s;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }

        .media-item:hover {
            background: var(--glass);
        }

        .media-item.active {
            background: rgba(124, 92, 252, 0.05);
            border-color: rgba(124, 92, 252, 0.2);
        }

        .item-thumb {
            width: 55px;
            height: 55px;
            border-radius: 15px;
            object-fit: cover;
        }

        .item-info h4 { font-size: 16px; margin-bottom: 4px; }
        .item-info p { font-size: 13px; color: var(--text-dim); }

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const Icons = {
            prev: <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>,
            next: <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        };

        function App() {
            const [state, setState] = useState(null);
            const [filter, setFilter] = useState("all");

            const fetchState = useCallback(async () => {
                const res = await fetch('/api/state');
                const data = await res.json();
                setState(data);
            }, []);

            useEffect(() => { fetchState(); }, [fetchState]);

            const runAction = async (url) => {
                const res = await fetch(url, { method: 'POST' });
                setState(await res.json());
            };

            const changeFilter = async (type) => {
                setFilter(type);
                await runAction(`/api/filter/${type}`);
            };

            if (!state || !state.file) return null;

            const { file, index, total, has_next, has_previous, library_name, all_files } = state;

            return (
                <div className="app">
                    <div className="header">
                        <h1>ФАЙЛЫ</h1>
                        <div className="lib-name">{library_name}</div>
                    </div>

                    <div className="main-card">
                        <div className="preview-box">
                            <div className="img-wrapper">
                                <img src={`/previews/${file.preview}`} alt={file.title} />
                            </div>
                            <div className="type-tag">{file.type.toUpperCase()}</div>
                        </div>

                        <div className="info-panel">
                            <span className="meta-top">FILE {index + 1} OF {total}</span>
                            <h2 className="file-title">{file.title}</h2>
                            <p className="file-size">{file.size} • </p>

                            <div className="controls">
                                <button 
                                    className="nav-btn" 
                                    disabled={!has_previous} 
                                    onClick={() => runAction('/api/previous')}
                                >
                                    {Icons.prev}
                                </button>
                                <button 
                                    className="nav-btn" 
                                    disabled={!has_next} 
                                    onClick={() => runAction('/api/next')}
                                >
                                    {Icons.next}
                                </button>
                            </div>

                            <div className="filter-group">
                                {["all", "image", "video", "doc"].map(t => (
                                    <button 
                                        key={t}
                                        className={`f-btn ${filter === t ? 'active' : ''}`}
                                        onClick={() => changeFilter(t)}
                                    >
                                        {t.toUpperCase()}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="list-section">
                        <div className="list-title">ФАЙЛЫ В ТЕКУЩЕЙ ВЫБОРКЕ</div>
                        {state.filtered_files.map((f, i) => (
                            <div 
                                key={i} 
                                className={`media-item ${f.title === file.title ? 'active' : ''}`}
                                style={{cursor: 'pointer'}}
                            >
                                <img className="item-thumb" src={`/previews/${f.preview}`} alt="" />
                                <div className="item-info">
                                    <h4>{f.title}</h4>
                                    <p>{f.type.toUpperCase()} • {f.size}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
